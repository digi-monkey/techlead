name: Pitfall CLI
# CLI flows for the pitfall sub-command of sprint-board.mjs.
# All flows use isolated_pitfalls: true to avoid mutating the real pitfalls.json.

flows:
  - name: "pitfall: records new entry and prints PF-ID"
    command: "node"
    args:
      - "scripts/sprint-board.mjs"
      - "pitfall"
      - "--task"
      - "AP-001"
      - "--failure-type"
      - "gate"
      - "--attempted"
      - "ran npm run check:all"
      - "--hypothesis"
      - "missing env var caused lint failure"
    isolated_pitfalls: true
    assert:
      must:
        - exit_code: 0
        - stdout_contains: ["Pitfall recorded", "PF-"]
      should: []

  - name: "pitfall: records entry with optional missing-context"
    command: "node"
    args:
      - "scripts/sprint-board.mjs"
      - "pitfall"
      - "--task"
      - "AP-002"
      - "--failure-type"
      - "acceptance"
      - "--attempted"
      - "validate:distribution"
      - "--hypothesis"
      - "template file missing"
      - "--missing-context"
      - "new required file not added to validate-distribution.mjs"
    isolated_pitfalls: true
    assert:
      must:
        - exit_code: 0
        - stdout_contains: ["Pitfall recorded", "PF-"]
      should: []

  - name: "pitfall: rejects invalid failure-type"
    command: "node"
    args:
      - "scripts/sprint-board.mjs"
      - "pitfall"
      - "--task"
      - "AP-001"
      - "--failure-type"
      - "bogus"
      - "--attempted"
      - "something"
      - "--hypothesis"
      - "something else"
    isolated_pitfalls: true
    assert:
      must:
        - exit_code_nonzero: true
        - stderr_contains: ["Invalid --failure-type"]
      should: []

  - name: "pitfall: rejects missing required --task"
    command: "node"
    args:
      - "scripts/sprint-board.mjs"
      - "pitfall"
      - "--failure-type"
      - "gate"
      - "--attempted"
      - "something"
      - "--hypothesis"
      - "reason"
    isolated_pitfalls: true
    assert:
      must:
        - exit_code_nonzero: true
        - stderr_contains: ["Missing required option"]
      should: []

  - name: "pitfall --list: prints empty message when no entries"
    command: "node"
    args:
      - "scripts/sprint-board.mjs"
      - "pitfall"
      - "--list"
    isolated_pitfalls: true
    assert:
      must:
        - exit_code: 0
        - stdout_contains: ["No pitfall entries found."]
      should: []

  - name: "pitfall --list --json: returns parseable JSON array"
    command: "node"
    args:
      - "scripts/sprint-board.mjs"
      - "pitfall"
      - "--list"
      - "--json"
    isolated_pitfalls: true
    assert:
      must:
        - exit_code: 0
        - stdout_json_parseable: true
      should: []

  - name: "pitfall --resolve: rejects unknown PF-ID"
    command: "node"
    args:
      - "scripts/sprint-board.mjs"
      - "pitfall"
      - "--resolve"
      - "PF-999"
      - "--resolution"
      - "fixed it"
    isolated_pitfalls: true
    assert:
      must:
        - exit_code_nonzero: true
        - stderr_contains: ["Pitfall not found"]
      should: []

  - name: "update --state Failed with failure-type: records failureDetail"
    command: "node"
    args:
      - "scripts/sprint-board.mjs"
      - "update"
      - "--id"
      - "AP-004"
      - "--state"
      - "Failed"
      - "--failure-type"
      - "acceptance"
      - "--attempted"
      - "ran validate:distribution"
      - "--hypothesis"
      - "missing pitfalls.json"
    isolated_state: true
    assert:
      must:
        - exit_code: 0
        - stdout_contains: ["Task updated", "Failed"]
      should: []

  - name: "update --state Failed with invalid failure-type: rejects"
    command: "node"
    args:
      - "scripts/sprint-board.mjs"
      - "update"
      - "--id"
      - "AP-004"
      - "--state"
      - "Failed"
      - "--failure-type"
      - "invalid"
    isolated_state: true
    assert:
      must:
        - exit_code_nonzero: true
        - stderr_contains: ["Invalid --failure-type"]
      should: []
