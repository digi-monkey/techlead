version: 1
projectPrefix: "AP"
sprint:
  stateFile: ".techlead/sprint-state.json"
  boardFile: "docs/todo/sprint.md"
  runJournalFile: "docs/todo/run-journal.md"
qualityGate:
  buildCommand: "npm run check:all"
  reviewCommand: "codex review --uncommitted"
  acceptanceTestCommand: "npm run validate:distribution"
review:
  domainRoleName: "Domain Expert"
  domainPrompt: "You are the domain expert for this product. Review behavioral correctness, user impact, and product consistency."
api:
  debugSetupEndpoint: "/api/debug/setup"
  debugChatEndpoint: "/api/debug/chat"
testing:
  resultsDir: "docs/quality/query-tests/results"
